name: CI

on:
  push:
  workflow_dispatch:

jobs:
  partial-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile check server.py, client.py, user_manager.py
        run: python -m py_compile src/server.py src/client.py src/user_manager.py

      - name: Generate self-signed TLS certificate
        # Exact command documented in README.md's "Environment Setup" section
        # (step 1 under "Steps"), plus -subj so it runs non-interactively:
        # without it, openssl prompts for DN fields on stdin and fails
        # immediately in CI, where stdin is closed.
        run: |
          openssl req -x509 -newkey rsa:2048 -nodes -out server.cert -keyout server.key -days 365 -subj "/CN=localhost"

      - name: Start server in the background
        # server.py's first-run flow (see user_manager.py's
        # _initialize_first_run_user) creates a one-time "admin" account with
        # a password generated by secrets.token_urlsafe(12) and prints it
        # once to stdout. There is no environment-variable override to set a
        # known password instead. Because of that, this workflow deliberately
        # does NOT attempt a full authenticated login round trip: doing so
        # would require scraping the server's stdout for the randomly
        # generated password, racing the server's startup output, and
        # parsing it out of interleaved log lines - which is fragile and
        # prone to flaking in CI for reasons unrelated to whether the code
        # actually works. Instead, this job verifies the parts of startup
        # that matter and are stable to check: the process compiles, the TLS
        # context loads the generated certificate/key without raising, and
        # the server actually binds and listens on its port. That is enough
        # to catch the class of regression this workflow is meant to catch
        # (e.g., a bad cert path, a TLS context misconfiguration, or a
        # startup-time exception) without needing to complete a real login.
        # Run from the repo root (not `cd src`) so server.py's
        # load_cert_chain(certfile="server.cert", keyfile="server.key") calls
        # -- relative to the working directory, not the script's location --
        # resolve to the cert/key generated at repo root above.
        run: |
          python src/server.py > server_output.log 2>&1 &
          echo $! > server.pid

      - name: Wait for server startup
        run: sleep 5

      - name: Verify server process is still alive
        run: |
          PID=$(cat server.pid)
          if ! kill -0 "$PID" 2>/dev/null; then
            echo "Server process is not running (crashed on startup)."
            echo "---- server_output.log ----"
            cat server_output.log || true
            exit 1
          fi
          echo "Server process $PID is alive."

      - name: Verify server port is open (TCP connect only, no login)
        # A successful TCP connect to localhost:5555 confirms the socket was
        # bound and the TLS context/certificate loaded without raising at
        # startup. It intentionally goes no further than the TCP layer - no
        # TLS handshake and no authentication - which is why this is a
        # partial end-to-end check rather than a full login test.
        run: |
          python -c "
          import socket
          import sys

          try:
              with socket.create_connection(('localhost', 5555), timeout=5):
                  print('Successfully connected to localhost:5555.')
          except OSError as e:
              print(f'Could not connect to localhost:5555: {e}')
              sys.exit(1)
          "

      - name: Print server output log
        if: always()
        run: |
          echo "---- server_output.log ----"
          cat server_output.log || true

      - name: Upload server log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-output-log
          path: server_output.log
          if-no-files-found: ignore

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then
            PID=$(cat server.pid)
            kill "$PID" 2>/dev/null || true
          fi
